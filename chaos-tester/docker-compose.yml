version: '3.8'
services:
  web:
    image: my-flask-app:latest
    ports: ["5000:5000"]
    depends_on: ["redis"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]